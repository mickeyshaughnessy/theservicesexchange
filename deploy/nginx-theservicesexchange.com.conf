# Public site — no access-code gate
# Deploy: copy to /etc/nginx/sites-available/theservicesexchange.com && nginx -t && systemctl reload nginx

server {
    server_name theservicesexchange.com www.theservicesexchange.com;
    root /var/www/theservicesexchange;
    index index.html;

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webmanifest|map)$ {
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri @backend;
    }

    # Android APK sideload (demand app)
    location ~* \.apk$ {
        default_type application/vnd.android.package-archive;
        add_header Content-Disposition 'attachment';
        add_header Cache-Control "public, max-age=3600";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ @backend;
    }

    location @backend {
        proxy_pass http://localhost:5004;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/theservicesexchange.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/theservicesexchange.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = www.theservicesexchange.com) {
        return 301 https://$host$request_uri;
    }
    if ($host = theservicesexchange.com) {
        return 301 https://$host$request_uri;
    }
    listen 80;
    server_name theservicesexchange.com www.theservicesexchange.com;
    return 404;
}
