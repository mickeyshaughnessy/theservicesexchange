# Siege Configuration for Service Exchange Load Testing
# All load testing traffic is marked with X-Load-Test: LOAD_TESTING header

verbose = true
color = on
quiet = false
show-logfile = true
logging = true
gmethod = HEAD
parser = true
cache = false
connection = close
concurrent = 10
file = urls_smoke.txt
protocol = HTTP/1.1
chunked = true
timeout = 30
delay = 0
internet = false
benchmark = false
accept-encoding = gzip, deflate
url-escaping = true

# Custom headers to mark load testing traffic
header = X-Load-Test: LOAD_TESTING
header = User-Agent: Siege-LoadTest/4.1.6
