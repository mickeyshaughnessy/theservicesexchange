openapi: 3.0.3
info:
  title: Robot Services Exchange API
  version: 1.0.0
  description: |
    The Robot Services Exchange (RSE) is an open marketplace for robot labor.
    Buyers post service requests ("bids") with a price and expiry; providers
    (robots or their operators) call `/grab_job` to be matched with the best
    available request. The exchange handles matching and reputation — payment
    is settled directly between the parties.

    **Authentication** — most endpoints require a Bearer token from `/login`:
    `Authorization: Bearer <access_token>`. Tokens expire after 24 hours.

    **Rate limits** — global default 1000/hour and 60/minute per IP.
    `/register`, `/login`, `POST /feedback`, `POST /feedback/{post_id}/reply`,
    and `POST /financing/apply` are limited to 20/minute. Chat endpoints allow
    120/minute. `/grab_job` additionally enforces a 15-minute per-account
    cooldown at the application level (HTTP 429 with seconds remaining).
  contact:
    email: mickeyshaughnessy@gmail.com
servers:
  - url: https://rse-api.com:5003
tags:
  - name: System
    description: Health, status, and platform statistics
  - name: Auth
    description: Registration, login, and account management
  - name: Marketplace
    description: Posting requests, grabbing jobs, and completing work
  - name: Discovery
    description: Public browsing of exchange activity
  - name: Communication
    description: Chat and community bulletin (authenticated)
  - name: Feedback
    description: Public feedback board with threaded replies
  - name: Financing
    description: Robot financing applications (partner integrations pending)
  - name: Cooperation
    description: |
      Multi-robot cooperation — ad-hoc per-job coalitions ("job parties") and
      dispute filing. A job party has no persistent identity: a provider who
      grabbed a job can invite co-providers just for that job, and the split
      dissolves once the job completes.
  - name: Campaigns
    description: |
      Multi-unit demand-side initiatives. A buyer posts a bulk/recurring need;
      providers commit capacity (a number of units); the campaign owner accepts
      or rejects each commitment. Accepted commitments become normal jobs.
  - name: Reputation
    description: Peer skill endorsements and platform leaderboards
  - name: Admin
    description: Stopgap admin endpoints gated on the X-Admin-Key shared-secret header

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: Access token from POST /login
  schemas:
    Error:
      type: object
      properties:
        error: { type: string }
    Job:
      type: object
      properties:
        job_id: { type: string, format: uuid }
        bid_id: { type: string, format: uuid }
        status: { type: string, enum: [accepted, completed, rejected] }
        service: { type: string, description: Service description (string, or JSON object for structured requests) }
        price: { type: number }
        currency: { type: string, example: USD }
        payment_method: { type: string, example: cash }
        location_type: { type: string, enum: [physical, remote, hybrid] }
        lat: { type: number, nullable: true }
        lon: { type: number, nullable: true }
        address: { type: string, nullable: true }
        buyer_username: { type: string }
        provider_username: { type: string }
        accepted_at: { type: integer, description: Unix timestamp }
        buyer_reputation: { type: number }
        provider_reputation: { type: number }
        start_address: { type: string, nullable: true, description: Rideshare pickup (null for non-rideshare) }
        end_address: { type: string, nullable: true, description: Rideshare dropoff (null for non-rideshare) }
        start_lat: { type: number, nullable: true }
        start_lon: { type: number, nullable: true }
        end_lat: { type: number, nullable: true }
        end_lon: { type: number, nullable: true }
        party:
          type: array
          items: { $ref: '#/components/schemas/JobPartyMember' }
          description: Ad-hoc co-provider invitations on this job (empty unless the provider formed a party)
        campaign_id: { type: string, nullable: true, description: Set when this job was spun up by accepting a campaign commitment }
    FeedbackPost:
      type: object
      properties:
        id: { type: string, format: uuid }
        username: { type: string }
        message: { type: string }
        created: { type: string, format: date-time }
        replies:
          type: array
          items:
            type: object
            properties:
              id: { type: string, format: uuid }
              username: { type: string }
              message: { type: string }
              created: { type: string, format: date-time }
    FinancingPartner:
      type: object
      properties:
        id: { type: string, example: robocapital }
        name: { type: string, example: RoboCapital }
        description: { type: string }
        rates_from: { type: string, example: 7.9% APR }
        min_amount: { type: number }
        max_amount: { type: number }
        integration_status: { type: string, example: pending }
    JobPartyMember:
      type: object
      properties:
        member_username: { type: string }
        share: { type: number, description: Fraction of the job (0-1, exclusive) this member earns credit for }
        status: { type: string, enum: [invited, accepted, declined] }
        invited_at: { type: integer }
        responded_at: { type: integer, nullable: true }
    Campaign:
      type: object
      properties:
        campaign_id: { type: string, format: uuid }
        owner_username: { type: string }
        title: { type: string }
        description: { type: string }
        service: { type: string, description: Service description (string, or JSON object) }
        unit_price: { type: number }
        currency: { type: string, example: USD }
        payment_method: { type: string, example: cash }
        units_needed: { type: integer }
        units_remaining: { type: integer }
        location_type: { type: string, enum: [physical, remote, hybrid] }
        address: { type: string, nullable: true }
        lat: { type: number, nullable: true }
        lon: { type: number, nullable: true }
        end_time: { type: integer, description: Unix timestamp when the campaign closes }
        created_at: { type: integer }
        status: { type: string, enum: [open, fulfilled, closed, expired] }
        commitments:
          type: array
          items: { $ref: '#/components/schemas/CampaignCommitment' }
    CampaignCommitment:
      type: object
      properties:
        commitment_id: { type: string, format: uuid }
        provider_username: { type: string }
        units: { type: integer }
        capabilities: { type: string }
        message: { type: string }
        status: { type: string, enum: [pending, accepted, rejected] }
        created_at: { type: integer }
        responded_at: { type: integer, nullable: true }
        job_ids:
          type: array
          items: { type: string }
    Dispute:
      type: object
      properties:
        dispute_id: { type: string, format: uuid }
        job_id: { type: string }
        filed_by: { type: string }
        counterparty: { type: string }
        reason: { type: string }
        filed_at: { type: integer }
        status: { type: string, enum: [open, resolved, dismissed] }
        resolution_note: { type: string, nullable: true }
        resolved_at: { type: integer, nullable: true }
    EndorsementSkill:
      type: object
      properties:
        skill: { type: string }
        count: { type: integer }
        endorsers:
          type: array
          items: { type: string }

paths:
  /ping:
    get:
      tags: [System]
      summary: Health check
      responses:
        '200':
          description: API is operational
          content:
            application/json:
              example: { message: Service Exchange API is operational }
  /health:
    get:
      tags: [System]
      summary: Detailed health check
      responses:
        '200':
          description: Health details
          content:
            application/json:
              example: { status: healthy, timestamp: 1751630000, service: Service Exchange API, version: 1.0.0 }
  /metrics:
    get:
      tags: [System]
      summary: Performance metrics
      description: Request counts and per-endpoint timing statistics since process start.
      responses:
        '200': { description: Metrics snapshot }
  /stats:
    get:
      tags: [System]
      summary: Platform statistics
      responses:
        '200':
          description: Signup and activity counts
          content:
            application/json:
              example: { demand_signups: 120, supply_signups: 85, total_users: 205, active_requests: 14, completed_jobs: 96 }

  /register:
    post:
      tags: [Auth]
      summary: Register a new user
      description: Rate limited to 20/minute.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password, user_type]
              properties:
                username: { type: string, minLength: 3, maxLength: 20 }
                password: { type: string, minLength: 8 }
                user_type: { type: string, enum: [demand, supply], description: demand = buyer, supply = provider }
      responses:
        '201':
          description: Registration successful
          content: { application/json: { example: { message: Registration successful } } }
        '400': { description: Validation error, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
        '409': { description: Username already exists, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
  /login:
    post:
      tags: [Auth]
      summary: Log in and obtain an access token
      description: Tokens expire after 24 hours. Rate limited to 20/minute.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username: { type: string }
                password: { type: string }
      responses:
        '200':
          description: Authenticated
          content:
            application/json:
              example: { access_token: 3f2b9c9e-uuid, username: robo_op_1 }
        '401': { description: Invalid credentials, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
  /account:
    get:
      tags: [Auth]
      summary: Get account info
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Account details
          content:
            application/json:
              example:
                username: robo_op_1
                created_on: 1751000000
                stars: 4.6
                total_ratings: 22
                completed_jobs: 20
                reputation_score: 4.51
                wallet_address: null
                seat_status: no_wallet
                seat_token_id: null
        '401': { description: Missing or invalid token }
        '404': { description: User not found }
  /set_wallet:
    post:
      tags: [Auth]
      summary: Link an Ethereum wallet address
      description: |
        Optional. Linking a wallet has no effect on marketplace access today.
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [wallet_address]
              properties:
                wallet_address: { type: string, example: '0x0000000000000000000000000000000000000001' }
      responses:
        '200': { description: Wallet linked }
        '400': { description: Invalid Ethereum address }
        '401': { description: Missing or invalid token }

  /my_bids:
    get:
      tags: [Marketplace]
      summary: List my active service requests
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Outstanding (unexpired, unmatched) bids, newest first
          content:
            application/json:
              example:
                bids:
                  - bid_id: uuid
                    service: Lawn Mowing Bot, 0.5 acre lot
                    price: 45
                    currency: USD
                    payment_method: cash
                    end_time: 1751720000
                    location_type: physical
                    address: 123 Main St, Denver, CO 80202
                    created_at: 1751630000
                    status: active
        '401': { description: Missing or invalid token }
  /my_jobs:
    get:
      tags: [Marketplace]
      summary: List my jobs (active, completed, rejected)
      description: Completed and rejected lists are capped at the 10 most recent.
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Jobs grouped by status, with per-job role and ratings
        '401': { description: Missing or invalid token }
  /submit_bid:
    post:
      tags: [Marketplace]
      summary: Post a service request (buyer)
      description: |
        Demand-type accounts only. Physical/hybrid requests require `lat`+`lon`
        or `address`. Rideshare requests may instead provide `start_address`
        and `end_address` (pickup becomes the request location).
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [service, price, end_time]
              properties:
                service: { type: string, description: What you want done (string or JSON object) }
                price: { type: number, exclusiveMinimum: 0 }
                currency: { type: string, default: USD }
                payment_method: { type: string, default: cash }
                end_time: { type: integer, description: Unix timestamp when the request expires (must be in the future) }
                location_type: { type: string, enum: [physical, remote, hybrid], default: physical }
                lat: { type: number }
                lon: { type: number }
                address: { type: string }
                start_address: { type: string, description: Rideshare pickup }
                end_address: { type: string, description: Rideshare dropoff }
      responses:
        '200':
          description: Request created
          content: { application/json: { example: { bid_id: uuid } } }
        '400': { description: Validation error }
        '401': { description: Missing or invalid token }
        '403': { description: Only demand-type accounts can submit bids }
  /cancel_bid:
    post:
      tags: [Marketplace]
      summary: Cancel a pending request
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [bid_id]
              properties:
                bid_id: { type: string }
      responses:
        '200': { description: Cancelled }
        '403': { description: Not your bid }
        '404': { description: Bid not found }
        '409': { description: Already accepted by a provider (job_id returned) }
  /grab_job:
    post:
      tags: [Marketplace]
      summary: Get matched with the best available job (provider)
      description: |
        Supply-type accounts only. Matching pipeline: (1) location filter,
        (2) AI capability match, (3) reputation alignment, (4) price.
        15-minute per-account cooldown between calls (429 with seconds
        remaining). Physical/hybrid providers must send `lat`+`lon` or `address`.
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [capabilities]
              properties:
                capabilities: { type: string, description: What your robot can do, in plain language }
                location_type: { type: string, enum: [physical, remote, hybrid], default: physical }
                lat: { type: number }
                lon: { type: number }
                address: { type: string }
                max_distance: { type: number, description: Max miles from your location (default 10) }
      responses:
        '200':
          description: Job assigned
          content: { application/json: { schema: { $ref: '#/components/schemas/Job' } } }
        '204': { description: No matching jobs available }
        '400': { description: Validation error }
        '401': { description: Missing or invalid token }
        '403': { description: Not a supply account }
        '429': { description: Cooldown active — wait before next grab }
  /reject_job:
    post:
      tags: [Marketplace]
      summary: Reject an assigned job (provider)
      description: Returns the request to the pool (extended 1 hour); you will not be re-matched to it.
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [job_id]
              properties:
                job_id: { type: string }
                reason: { type: string }
      responses:
        '200': { description: Rejected }
        '400': { description: Job not in accepted state }
        '403': { description: Only the provider can reject }
        '404': { description: Job not found }
  /sign_job:
    post:
      tags: [Marketplace]
      summary: Complete and rate a job
      description: |
        Both buyer and provider sign with a 1-5 star rating; the job is marked
        completed once both have signed. `rating` is the documented field name;
        `star_rating` is accepted as a legacy alias.
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [job_id, rating]
              properties:
                job_id: { type: string }
                rating: { type: integer, minimum: 1, maximum: 5 }
      responses:
        '200': { description: Signed }
        '400': { description: Invalid rating, already signed, or job not signable }
        '403': { description: Not a party to this job }
        '404': { description: Job not found }

  /nearby:
    post:
      tags: [Discovery]
      summary: Find nearby open requests (public)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                lat: { type: number }
                lon: { type: number }
                address: { type: string, description: Alternative to lat/lon }
                radius: { type: number, default: 10, description: Miles }
      responses:
        '200':
          description: Open physical/hybrid requests within radius, nearest first
        '400': { description: Location required or ungeocodable address }
  /exchange_data:
    get:
      tags: [Discovery]
      summary: Exchange activity data (public)
      parameters:
        - { name: category, in: query, schema: { type: string }, description: Substring filter on service }
        - { name: location, in: query, schema: { type: string }, description: Substring filter on address }
        - { name: limit, in: query, schema: { type: integer, default: 50, maximum: 200 } }
        - { name: include_completed, in: query, schema: { type: boolean, default: false } }
      responses:
        '200': { description: Active bids, optional completed jobs, and market stats }

  /chat:
    post:
      tags: [Communication]
      summary: Send a direct message
      description: Rate limited to 120/minute.
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [recipient, message]
              properties:
                recipient: { type: string }
                message: { type: string }
                job_id: { type: string, description: Optional job to link }
      responses:
        '200': { description: Sent }
        '400': { description: Missing fields or self-message }
        '404': { description: Recipient not found }
  /chat/conversations:
    get:
      tags: [Communication]
      summary: List my conversations
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Conversations with last message, newest first }
  /chat/messages:
    post:
      tags: [Communication]
      summary: Get message history with one user
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [conversation_id]
              properties:
                conversation_id: { type: string, description: The other user's username }
      responses:
        '200': { description: Messages in chronological order }
        '400': { description: Conversation ID required }
  /chat/reply:
    post:
      tags: [Communication]
      summary: Reply in a conversation
      description: Alias of POST /chat.
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [recipient, message]
              properties:
                recipient: { type: string }
                message: { type: string }
      responses:
        '200': { description: Sent }
  /bulletin:
    post:
      tags: [Communication]
      summary: Post to the community bulletin
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, content]
              properties:
                title: { type: string }
                content: { type: string }
                category: { type: string, enum: [announcement, question, offer, general], default: general }
      responses:
        '200': { description: Posted }
        '400': { description: Title and content required }
  /bulletin/feed:
    get:
      tags: [Communication]
      summary: Get the bulletin feed
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: All bulletin posts }

  /feedback:
    get:
      tags: [Feedback]
      summary: List feedback posts (public)
      responses:
        '200':
          description: All feedback posts, newest first
          content:
            application/json:
              schema:
                type: object
                properties:
                  posts:
                    type: array
                    items: { $ref: '#/components/schemas/FeedbackPost' }
    post:
      tags: [Feedback]
      summary: Submit feedback (public)
      description: No login required. Rate limited to 20/minute.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [message]
              properties:
                message: { type: string, maxLength: 2000 }
                username: { type: string, maxLength: 40, description: Optional display name (defaults to Guest) }
      responses:
        '201':
          description: Post created
          content:
            application/json:
              schema:
                type: object
                properties:
                  post: { $ref: '#/components/schemas/FeedbackPost' }
        '400': { description: Message required }
  /feedback/{post_id}/reply:
    post:
      tags: [Feedback]
      summary: Reply to a feedback post (public)
      description: No login required. Rate limited to 20/minute.
      parameters:
        - { name: post_id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [message]
              properties:
                message: { type: string, maxLength: 2000 }
                username: { type: string, maxLength: 40 }
      responses:
        '201': { description: Reply created }
        '400': { description: Message required }
        '404': { description: Post not found }

  /financing/partners:
    get:
      tags: [Financing]
      summary: List financing partners (public)
      description: Partner integrations are currently pending — applications are queued.
      responses:
        '200':
          description: Available financing partners
          content:
            application/json:
              schema:
                type: object
                properties:
                  partners:
                    type: array
                    items: { $ref: '#/components/schemas/FinancingPartner' }
  /financing/apply:
    post:
      tags: [Financing]
      summary: Submit a robot financing application (public)
      description: |
        Routes one application to up to 3 partners. No login required and no
        credit check — partner integrations are pending, so applications are
        validated, stored, and queued with per-partner status `pending`.
        Rate limited to 20/minute.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, robot_model, loan_amount]
              properties:
                name: { type: string, maxLength: 80 }
                email: { type: string, format: email }
                phone: { type: string, maxLength: 40 }
                robot_model: { type: string, example: Unitree G1 }
                loan_amount: { type: number, exclusiveMinimum: 0, maximum: 5000000, description: USD }
                term_months: { type: integer, default: 36 }
                credit_range: { type: string, enum: [excellent, good, fair, poor, unknown], default: unknown }
                partners:
                  type: array
                  maxItems: 3
                  items: { type: string }
                  description: Partner ids from GET /financing/partners (defaults to all)
      responses:
        '201':
          description: Application queued
          content:
            application/json:
              example:
                application_id: uuid
                status: submitted
                partner_responses:
                  - partner_id: robocapital
                    partner_name: RoboCapital
                    status: pending
                    note: Application queued — partner integration pending. You will be contacted by email.
        '400': { description: Validation error }

  /jobs/{job_id}/party/invite:
    post:
      tags: [Cooperation]
      summary: Invite a co-provider to share a job (ad-hoc job party)
      description: |
        Only the job's primary provider may invite. The job must be in
        `accepted` state. The primary provider always keeps at least a 5%
        share, so the sum of invited/accepted shares is capped at 0.95.
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: job_id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [member_username, share]
              properties:
                member_username: { type: string }
                share: { type: number, exclusiveMinimum: 0, exclusiveMaximum: 1 }
                side: { type: string, enum: [supply, demand], default: supply, description: supply = co-providers; demand = co-buyers (DEMAND_PARTY_ENABLED) }
      responses:
        '201':
          description: Invitation created
          content:
            application/json:
              schema:
                type: object
                properties:
                  job_id: { type: string }
                  party:
                    type: array
                    items: { $ref: '#/components/schemas/JobPartyMember' }
        '400': { description: Validation error, already invited, or share exceeds available capacity }
        '403': { description: Only the primary provider can invite }
        '404': { description: Job or member_username not found }
  /jobs/{job_id}/party/respond:
    post:
      tags: [Cooperation]
      summary: Accept or decline a job-party invitation
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: job_id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [action]
              properties:
                action: { type: string, enum: [accept, decline] }
      responses:
        '200': { description: Invitation updated }
        '400': { description: Missing fields or already responded }
        '404': { description: Job not found or no invitation for this user }
  /jobs/{job_id}/party:
    get:
      tags: [Cooperation]
      summary: View a job's party roster
      description: Visible to the buyer, the primary provider, and any invited/accepted party members.
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: job_id, in: path, required: true, schema: { type: string } }
      responses:
        '200':
          description: Party roster and the primary provider's residual share
          content:
            application/json:
              schema:
                type: object
                properties:
                  job_id: { type: string }
                  provider_username: { type: string }
                  provider_share: { type: number }
                  party:
                    type: array
                    items: { $ref: '#/components/schemas/JobPartyMember' }
        '403': { description: Not a party to this job }
        '404': { description: Job not found }
  /jobs/{job_id}/channel:
    get:
      tags: [Communication]
      summary: Get job channel metadata (members, state, read cursor)
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: job_id, in: path, required: true, schema: { type: string } }
      responses:
        '200': { description: Channel meta for accepted participants }
        '403': { description: Not a channel member (pending invitees excluded) }
        '404': { description: Job not found }
  /jobs/{job_id}/messages:
    get:
      tags: [Communication]
      summary: List job channel messages (poll with since_ts / after_id)
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: job_id, in: path, required: true, schema: { type: string } }
        - { name: since_ts, in: query, schema: { type: integer } }
        - { name: after_id, in: query, schema: { type: string } }
        - { name: limit, in: query, schema: { type: integer, default: 50, maximum: 100 } }
      responses:
        '200': { description: Paginated messages }
        '403': { description: Not a channel member }
    post:
      tags: [Communication]
      summary: Post a message to a job channel
      description: |
        Client message_type may be `user`, `agent_structured`, or `status`.
        `system` is server-only (400 if sent by client). Channel is read-only
        after job completed/rejected.
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: job_id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [body]
              properties:
                body: { type: string, maxLength: 4000 }
                message_type: { type: string, enum: [user, agent_structured, status], default: user }
                payload: { type: object }
                client_message_id: { type: string, description: Idempotency key per sender }
      responses:
        '201': { description: Message created }
        '200': { description: Idempotent replay of client_message_id }
        '400': { description: Validation error }
        '403': { description: Not a member or channel read-only }
        '429': { description: Rate limited }
  /jobs/{job_id}/messages/read:
    post:
      tags: [Communication]
      summary: Mark job channel as read (cursor)
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: job_id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [last_read_ts]
              properties:
                last_read_ts: { type: integer }
      responses:
        '200': { description: Cursor updated }
  /chat/read:
    post:
      tags: [Communication]
      summary: Mark a DM conversation as read (cursor-based)
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [conversation_id, last_read_ts]
              properties:
                conversation_id: { type: string, description: Peer username }
                last_read_ts: { type: integer }
      responses:
        '200': { description: Cursor updated }

  /jobs/{job_id}/dispute:
    post:
      tags: [Cooperation]
      summary: File a dispute on a job
      description: Either the buyer or the provider on the job may file. Reviewed by admins via GET /admin/disputes.
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: job_id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason: { type: string, maxLength: 1000 }
      responses:
        '201':
          description: Dispute filed
          content: { application/json: { schema: { $ref: '#/components/schemas/Dispute' } } }
        '400': { description: reason required }
        '403': { description: Not a party to this job }
        '404': { description: Job not found }

  /campaigns:
    post:
      tags: [Campaigns]
      summary: Create a multi-unit campaign (buyer)
      description: Demand-type accounts only. Physical/hybrid campaigns require `lat`+`lon` or `address`.
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, service, unit_price, units_needed, end_time]
              properties:
                title: { type: string, maxLength: 120 }
                description: { type: string, maxLength: 2000 }
                service: { type: string, description: What you need done (string or JSON object) }
                unit_price: { type: number, exclusiveMinimum: 0 }
                units_needed: { type: integer, minimum: 1 }
                currency: { type: string, default: USD }
                payment_method: { type: string, default: cash }
                location_type: { type: string, enum: [physical, remote, hybrid], default: physical }
                address: { type: string }
                lat: { type: number }
                lon: { type: number }
                end_time: { type: integer, description: Unix timestamp when the campaign closes (must be in the future) }
      responses:
        '201':
          description: Campaign created
          content: { application/json: { schema: { $ref: '#/components/schemas/Campaign' } } }
        '400': { description: Validation error }
        '403': { description: Only demand-type accounts can create campaigns }
    get:
      tags: [Campaigns]
      summary: List open campaigns (public)
      parameters:
        - { name: category, in: query, schema: { type: string }, description: Substring filter on title/service }
        - { name: location, in: query, schema: { type: string }, description: Substring filter on address }
        - { name: limit, in: query, schema: { type: integer, default: 50, maximum: 200 } }
      responses:
        '200':
          description: Open campaigns (commitments omitted from this list view), newest first
          content:
            application/json:
              schema:
                type: object
                properties:
                  campaigns:
                    type: array
                    items: { $ref: '#/components/schemas/Campaign' }
  /campaigns/{campaign_id}:
    get:
      tags: [Campaigns]
      summary: Get full campaign detail, including commitments (public)
      parameters:
        - { name: campaign_id, in: path, required: true, schema: { type: string } }
      responses:
        '200': { description: Campaign detail, content: { application/json: { schema: { $ref: '#/components/schemas/Campaign' } } } }
        '404': { description: Campaign not found }
  /campaigns/{campaign_id}/commit:
    post:
      tags: [Campaigns]
      summary: Commit capacity toward fulfilling a campaign (provider)
      description: Supply-type accounts only. Cannot commit to your own campaign.
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: campaign_id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [units]
              properties:
                units: { type: integer, minimum: 1 }
                capabilities: { type: string, maxLength: 400 }
                message: { type: string, maxLength: 500 }
      responses:
        '201':
          description: Commitment created (pending owner review)
          content:
            application/json:
              schema:
                type: object
                properties:
                  campaign_id: { type: string }
                  commitment: { $ref: '#/components/schemas/CampaignCommitment' }
        '400': { description: Validation error, campaign not open, or insufficient units remaining }
        '403': { description: Only supply-type accounts can commit, or campaign is your own }
        '404': { description: Campaign not found }
  /campaigns/{campaign_id}/commitments/{commitment_id}/accept:
    post:
      tags: [Campaigns]
      summary: Accept a pending commitment (campaign owner)
      description: |
        Creates a normal job record for the committed units (same shape as a
        grab_job result) and decrements the campaign's units_remaining. The
        campaign is marked `fulfilled` once units_remaining reaches zero.
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: campaign_id, in: path, required: true, schema: { type: string } }
        - { name: commitment_id, in: path, required: true, schema: { type: string } }
      responses:
        '200':
          description: Commitment accepted and job created
          content:
            application/json:
              schema:
                type: object
                properties:
                  campaign_id: { type: string }
                  commitment: { $ref: '#/components/schemas/CampaignCommitment' }
                  job: { $ref: '#/components/schemas/Job' }
        '400': { description: Commitment already responded to, or campaign no longer open }
        '403': { description: Only the campaign owner can respond }
        '404': { description: Campaign or commitment not found }
  /campaigns/{campaign_id}/commitments/{commitment_id}/reject:
    post:
      tags: [Campaigns]
      summary: Reject a pending commitment (campaign owner)
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: campaign_id, in: path, required: true, schema: { type: string } }
        - { name: commitment_id, in: path, required: true, schema: { type: string } }
      responses:
        '200': { description: Commitment rejected }
        '400': { description: Commitment already responded to }
        '403': { description: Only the campaign owner can respond }
        '404': { description: Campaign or commitment not found }
  /agents:
    post:
      tags: [Auth]
      summary: Create an agent token (operator account)
      description: |
        Returns `agent_token` **once**. Default scopes are `history:read` only.
        Agents use Bearer auth; routes not in the server allowlist return 403 (default-deny).
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                label: { type: string }
                robot_id: { type: string, description: Must match robots_owned[].id if set }
                scopes:
                  type: array
                  items: { type: string }
                  default: [history:read]
                expires_at: { type: integer, nullable: true }
      responses:
        '201':
          description: Agent created; agent_token shown once
        '400': { description: Validation error }
        '403': { description: Agent tokens disabled or max agents reached }
    get:
      tags: [Auth]
      summary: List agents for the authenticated account
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Agents without secrets
  /agents/{agent_id}:
    delete:
      tags: [Auth]
      summary: Revoke an agent token
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: agent_id, in: path, required: true, schema: { type: string } }
      responses:
        '200': { description: Revoked }
        '404': { description: Agent not found }
  /agents/{agent_id}/rotate:
    post:
      tags: [Auth]
      summary: Rotate agent secret (new token once)
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: agent_id, in: path, required: true, schema: { type: string } }
      responses:
        '200': { description: New agent_token }
        '404': { description: Agent not found }

  /my_campaigns:
    get:
      tags: [Campaigns]
      summary: List my owned campaigns and my commitments on others' campaigns
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: owned_campaigns and my_commitments
          content:
            application/json:
              schema:
                type: object
                properties:
                  owned_campaigns:
                    type: array
                    items: { $ref: '#/components/schemas/Campaign' }
                  my_commitments:
                    type: array
                    items: { type: object }

  /endorsements:
    post:
      tags: [Reputation]
      summary: Endorse another user for a skill
      description: |
        Idempotent per (endorser, target, skill) — re-endorsing the same skill
        just refreshes the timestamp. Endorsements are shown on profiles as
        social proof; they do not alter reputation_score used for job matching.
        Rate limited to 20/minute.
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [target_username, skill]
              properties:
                target_username: { type: string }
                skill: { type: string, maxLength: 40 }
      responses:
        '201': { description: Endorsement recorded }
        '400': { description: Missing fields or endorsing yourself }
        '404': { description: target_username not found }
  /endorsements/{username}:
    get:
      tags: [Reputation]
      summary: Get a user's received endorsements, aggregated by skill (public)
      parameters:
        - { name: username, in: path, required: true, schema: { type: string } }
      responses:
        '200':
          description: Endorsement summary
          content:
            application/json:
              schema:
                type: object
                properties:
                  username: { type: string }
                  total_endorsements: { type: integer }
                  skills:
                    type: array
                    items: { $ref: '#/components/schemas/EndorsementSkill' }
        '404': { description: User not found }
  /leaderboard:
    get:
      tags: [Reputation]
      summary: Platform leaderboards (public)
      description: |
        Three rankings, top 10 each: `top_reputation` (accounts with 3+
        ratings), `top_campaign_fulfillers` (units fulfilled via accepted
        campaign commitments), and `top_collaborators` (completed job-party
        participations).
      responses:
        '200': { description: Leaderboard rankings }

  /admin/disputes:
    get:
      tags: [Admin]
      summary: List filed disputes (admin)
      description: Requires the `X-Admin-Key` header (shared secret; no per-admin accounts exist yet).
      parameters:
        - { name: status, in: query, schema: { type: string, enum: [open, resolved, dismissed] } }
      responses:
        '200':
          description: Disputes, newest first
          content:
            application/json:
              schema:
                type: object
                properties:
                  disputes:
                    type: array
                    items: { $ref: '#/components/schemas/Dispute' }
        '401': { description: Missing or invalid X-Admin-Key }
  /admin/disputes/{dispute_id}/resolve:
    post:
      tags: [Admin]
      summary: Resolve or dismiss a dispute (admin)
      description: Requires the `X-Admin-Key` header.
      parameters:
        - { name: dispute_id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status: { type: string, enum: [resolved, dismissed] }
                note: { type: string, maxLength: 1000 }
      responses:
        '200': { description: Dispute updated, content: { application/json: { schema: { $ref: '#/components/schemas/Dispute' } } } }
        '400': { description: Invalid status }
        '401': { description: Missing or invalid X-Admin-Key }
        '404': { description: Dispute not found }
