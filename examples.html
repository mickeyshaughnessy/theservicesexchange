<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robot Services Exchange - Examples</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="styles.css?v=4" rel="stylesheet">
    <style>
        html, body { height: 100%; }
        body { display: flex; flex-direction: column; }
        .examples-tabs {
            background: var(--bg-dark);
            border-bottom: 1px solid rgba(0,255,255,0.25);
            padding: 0.75rem 0 0;
        }
        .examples-tabs .tab-btn {
            font-family: 'Press Start 2P', monospace;
            font-size: 0.65rem;
            color: var(--text-dim);
            background: transparent;
            border: 1px solid transparent;
            border-bottom: none;
            padding: 12px 20px;
            cursor: pointer;
            transition: color 0.15s;
        }
        .examples-tabs .tab-btn:hover { color: var(--primary); }
        .examples-tabs .tab-btn.active {
            color: var(--primary);
            text-shadow: 0 0 8px rgba(0,255,255,0.6);
            border-color: rgba(0,255,255,0.35);
            background: var(--bg-deep);
        }
        .examples-frame-wrap { flex: 1 1 auto; min-height: 0; }
        .examples-frame-wrap iframe {
            display: none;
            width: 100%;
            height: 100%;
            border: none;
            background: var(--bg-deep);
        }
        .examples-frame-wrap iframe.active { display: block; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">RSE</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="robots.html">Buy a Robot</a></li>
                    <li class="nav-item"><a class="nav-link active" href="examples.html" aria-current="page">Examples</a></li>
                    <li class="nav-item"><a class="nav-link" href="api_docs.html">API Docs</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
                    <li class="nav-item"><a class="nav-link" href="feedback.html">Feedback</a></li>
                </ul>
                <button id="loginButton" class="btn btn-light ms-3" onclick="location.href='index.html'">Get Started</button>
            </div>
        </div>
    </nav>

    <div class="examples-tabs">
        <div class="container">
            <button class="tab-btn" data-tab="demo" onclick="showTab('demo')">GUIDED DEMO</button>
            <button class="tab-btn" data-tab="dashboard" onclick="showTab('dashboard')">LIVE DASHBOARD</button>
            <button class="tab-btn" data-tab="rideshare" onclick="showTab('rideshare')">RIDESHARE SIM</button>
        </div>
    </div>

    <div class="examples-frame-wrap">
        <iframe id="frame-demo" title="Guided demo scenarios"></iframe>
        <iframe id="frame-dashboard" title="Live exchange dashboard"></iframe>
        <iframe id="frame-rideshare" title="Denver rideshare simulation"></iframe>
    </div>

    <script>
    const TAB_SRC = {
        demo: 'examples/demo.html',
        dashboard: 'examples/dashboard.html',
        rideshare: 'examples/rideshare.html'
    };

    function showTab(name) {
        if (!TAB_SRC[name]) name = 'demo';
        document.querySelectorAll('.examples-tabs .tab-btn').forEach(b =>
            b.classList.toggle('active', b.dataset.tab === name));
        Object.keys(TAB_SRC).forEach(key => {
            const frame = document.getElementById('frame-' + key);
            frame.classList.toggle('active', key === name);
            // Lazy-load each sim the first time its tab is opened
            if (key === name && !frame.src) frame.src = TAB_SRC[key];
        });
        history.replaceState(null, '', 'examples.html?tab=' + name);
    }

    showTab(new URLSearchParams(location.search).get('tab') || 'demo');
    </script>
</body>
</html>
