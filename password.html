<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Services Exchange</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Press+Start+2P&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a2e;
    color: #b0c8ff;
    font-family: 'Share Tech Mono', 'Courier New', monospace;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background-image: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,255,255,0.015) 2px,
      rgba(0,255,255,0.015) 4px
    );
  }

  .container {
    width: 100%;
    max-width: 420px;
    padding: 20px;
  }

  .logo {
    text-align: center;
    margin-bottom: 40px;
  }

  .logo h1 {
    font-family: 'Press Start 2P', monospace;
    font-size: 13px;
    color: #00ffff;
    text-shadow: 0 0 10px rgba(0,255,255,0.5);
    line-height: 1.6;
    letter-spacing: 1px;
  }

  .logo .subtitle {
    font-size: 11px;
    color: #5566aa;
    margin-top: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .panel {
    background: #0f0f4a;
    border: 1px solid rgba(0,255,255,0.25);
    padding: 32px;
    position: relative;
  }

  .panel::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, #00ffff, transparent);
  }

  .panel h2 {
    font-size: 11px;
    color: #5566aa;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 24px;
  }

  .field {
    margin-bottom: 20px;
  }

  .field label {
    display: block;
    font-size: 10px;
    color: #5566aa;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .field input[type="password"] {
    width: 100%;
    background: #080828;
    border: 1px solid rgba(0,255,255,0.2);
    color: #00ffff;
    font-family: 'Share Tech Mono', monospace;
    font-size: 16px;
    padding: 12px 14px;
    outline: none;
    letter-spacing: 4px;
    transition: border-color 0.2s;
  }

  .field input[type="password"]:focus {
    border-color: #00ffff;
    box-shadow: 0 0 8px rgba(0,255,255,0.2);
  }

  button {
    width: 100%;
    background: transparent;
    border: 1px solid #00ffff;
    color: #00ffff;
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    padding: 14px;
    cursor: pointer;
    letter-spacing: 3px;
    text-transform: uppercase;
    transition: all 0.2s;
    margin-top: 4px;
  }

  button:hover {
    background: rgba(0,255,255,0.08);
    box-shadow: 0 0 12px rgba(0,255,255,0.3);
  }

  .error {
    background: rgba(255,51,51,0.1);
    border: 1px solid rgba(255,51,51,0.4);
    color: #ff3333;
    font-size: 11px;
    padding: 10px 12px;
    margin-bottom: 20px;
    letter-spacing: 1px;
  }

  .footer {
    text-align: center;
    margin-top: 28px;
    font-size: 10px;
    color: #2a3a6a;
    letter-spacing: 1px;
  }
</style>
</head>
<body>
<div class="container">
  <div class="logo">
    <h1>THE SERVICES<br>EXCHANGE</h1>
    <div class="subtitle">Restricted Access</div>
  </div>
  <div class="panel">
    <h2>Enter Access Code</h2>

    <form method="POST" action="/site_login">
      <div class="field">
        <label for="password">Access Code</label>
        <input type="password" id="password" name="password" autofocus autocomplete="current-password" placeholder="••••••••">
      </div>
      <button type="submit">Authenticate &rsaquo;</button>
    </form>
  </div>
  <div class="footer">theservicesexchange.com &mdash; private beta</div>
</div>

<script>
  // Show error if redirected back with ?error=1
  if (window.location.search.includes('error=1')) {
    const panel = document.querySelector('.panel h2');
    const err = document.createElement('div');
    err.className = 'error';
    err.textContent = 'Invalid access code. Try again.';
    panel.insertAdjacentElement('afterend', err);
  }
</script>
</body>
</html>
