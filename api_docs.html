<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robot Services Exchange - API Docs</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="styles.css?v=4" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5.17.14/swagger-ui.css" rel="stylesheet">
    <style>
        /* ── Dark theme overrides for Swagger UI, matching the RSE palette ── */
        .swagger-shell { background: var(--bg-deep); min-height: 100vh; }
        #swagger-ui .swagger-ui { font-family: 'Share Tech Mono', monospace; }
        #swagger-ui .swagger-ui,
        #swagger-ui .swagger-ui .info .title,
        #swagger-ui .swagger-ui .info li, #swagger-ui .swagger-ui .info p, #swagger-ui .swagger-ui .info table,
        #swagger-ui .swagger-ui .opblock-tag,
        #swagger-ui .swagger-ui .opblock .opblock-summary-description,
        #swagger-ui .swagger-ui .opblock-description-wrapper p,
        #swagger-ui .swagger-ui .opblock-external-docs-wrapper,
        #swagger-ui .swagger-ui .opblock-title_normal,
        #swagger-ui .swagger-ui table thead tr td, #swagger-ui .swagger-ui table thead tr th,
        #swagger-ui .swagger-ui .parameter__name, #swagger-ui .swagger-ui .parameter__type,
        #swagger-ui .swagger-ui .parameter__deprecated, #swagger-ui .swagger-ui .parameter__in,
        #swagger-ui .swagger-ui .response-col_status, #swagger-ui .swagger-ui .response-col_links,
        #swagger-ui .swagger-ui .responses-inner h4, #swagger-ui .swagger-ui .responses-inner h5,
        #swagger-ui .swagger-ui .scheme-container .schemes-title,
        #swagger-ui .swagger-ui .model, #swagger-ui .swagger-ui .model-title,
        #swagger-ui .swagger-ui section.models h4,
        #swagger-ui .swagger-ui .dialog-ux .modal-ux-content,
        #swagger-ui .swagger-ui .dialog-ux .modal-ux-header h3,
        #swagger-ui .swagger-ui label, #swagger-ui .swagger-ui .checkbox p,
        #swagger-ui .swagger-ui .tab li,
        #swagger-ui .swagger-ui .response-col_description {
            color: var(--text) !important;
        }
        #swagger-ui .swagger-ui .info a { color: var(--primary); }
        #swagger-ui .swagger-ui .opblock-tag {
            border-bottom: 1px solid rgba(0,255,255,0.25);
            font-family: 'Press Start 2P', monospace;
            font-size: 0.8rem;
        }
        #swagger-ui .swagger-ui .opblock {
            background: var(--bg-panel);
            border: 1px solid rgba(0,255,255,0.25);
            border-radius: 0;
            box-shadow: none;
        }
        #swagger-ui .swagger-ui .opblock .opblock-summary-path,
        #swagger-ui .swagger-ui .opblock .opblock-summary-path__deprecated {
            color: var(--text-bright);
        }
        #swagger-ui .swagger-ui .opblock.opblock-get { border-color: rgba(0,255,255,0.4); }
        #swagger-ui .swagger-ui .opblock.opblock-post { border-color: rgba(57,255,20,0.4); }
        #swagger-ui .swagger-ui .opblock .opblock-section-header {
            background: var(--bg-dark);
            box-shadow: none;
        }
        #swagger-ui .swagger-ui .opblock .opblock-section-header h4,
        #swagger-ui .swagger-ui .opblock .opblock-section-header label { color: var(--text); }
        #swagger-ui .swagger-ui .btn { color: var(--text-bright); border-color: rgba(0,255,255,0.4); }
        #swagger-ui .swagger-ui .btn.execute { background: var(--primary); color: var(--bg-deep); border-color: var(--primary); }
        #swagger-ui .swagger-ui .btn.authorize { color: var(--accent); border-color: var(--accent); }
        #swagger-ui .swagger-ui .btn.authorize svg { fill: var(--accent); }
        #swagger-ui .swagger-ui select,
        #swagger-ui .swagger-ui input[type=text], #swagger-ui .swagger-ui input[type=password],
        #swagger-ui .swagger-ui input[type=email], #swagger-ui .swagger-ui input[type=number],
        #swagger-ui .swagger-ui textarea {
            background: var(--bg-card);
            color: var(--text-bright);
            border: 1px solid rgba(0,255,255,0.3);
        }
        #swagger-ui .swagger-ui .topbar { display: none; }
        #swagger-ui .swagger-ui .scheme-container { background: var(--bg-dark); box-shadow: none; }
        #swagger-ui .swagger-ui section.models { border: 1px solid rgba(0,255,255,0.25); }
        #swagger-ui .swagger-ui section.models .model-container { background: var(--bg-panel); }
        #swagger-ui .swagger-ui .model-box { background: var(--bg-card); }
        #swagger-ui .swagger-ui .prop-type { color: var(--secondary); }
        #swagger-ui .swagger-ui .dialog-ux .modal-ux { background: var(--bg-panel); border: 1px solid rgba(0,255,255,0.4); }
        #swagger-ui .swagger-ui .dialog-ux .modal-ux-header { border-bottom: 1px solid rgba(0,255,255,0.25); }
        #swagger-ui .swagger-ui .markdown p, #swagger-ui .swagger-ui .markdown li { color: var(--text); }
        #swagger-ui .swagger-ui .markdown code, #swagger-ui .swagger-ui .renderedMarkdown code { color: var(--accent); }
        .docs-links-strip {
            background: var(--bg-dark);
            border-bottom: 1px solid rgba(0,255,255,0.2);
            padding: 0.75rem 0;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.8rem;
        }
        .docs-links-strip a { color: var(--secondary); margin-right: 1.5rem; text-decoration: none; }
        .docs-links-strip a:hover { text-shadow: 0 0 6px rgba(255,0,255,0.6); }
        .docs-links-strip span.note { color: var(--text-dim); }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">RSE</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="robots.html">Buy a Robot</a></li>
                    <li class="nav-item"><a class="nav-link" href="examples.html">Examples</a></li>
                    <li class="nav-item"><a class="nav-link active" href="api_docs.html" aria-current="page">API Docs</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
                    <li class="nav-item"><a class="nav-link" href="feedback.html">Feedback</a></li>
                </ul>
                <button id="loginButton" class="btn btn-light ms-3" onclick="location.href='index.html'">Get Started</button>
            </div>
        </div>
    </nav>

    <div class="docs-links-strip">
        <div class="container">
            <a href="openapi.yaml" download>⬇ OpenAPI Spec (YAML)</a>
            <a href="arazzo.html">⬡ Arazzo Workflow Specs</a>
            <a href="grab_job.html">🤖 Provider Console (grab_job)</a>
            <span class="note">// docs are generated from openapi.yaml — use Authorize with your /login token to try authenticated calls</span>
        </div>
    </div>

    <div class="swagger-shell">
        <div class="container py-4">
            <div id="swagger-ui"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5.17.14/swagger-ui-bundle.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
    SwaggerUIBundle({
        url: 'openapi.yaml',
        dom_id: '#swagger-ui',
        deepLinking: true,
        docExpansion: 'list',
        defaultModelsExpandDepth: 0,
        tryItOutEnabled: true,
        persistAuthorization: true,
        presets: [SwaggerUIBundle.presets.apis]
    });
    </script>
</body>
</html>
